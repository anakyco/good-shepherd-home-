<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Good Shepherd Old People Home</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#2E8B57;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2E8B57;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1f6d45;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
            color:#2E8B57;
        }
    </style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<p>
Don't have an account?
<a href="/register">Register Here</a>
</p>

</div>

</body>
</html>

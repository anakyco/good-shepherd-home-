<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:#2E8B57;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.menu{
    margin-top:20px;
}

.menu a{
    display:block;
    padding:15px;
    margin:10px 0;
    text-decoration:none;
    background:#2E8B57;
    color:white;
    border-radius:6px;
}

.menu a:hover{
    background:#1f6d45;
}

.logout{
    background:red !important;
}

</style>

</head>

<body>

<header>

<h1>Good Shepherd Old People Home</h1>

<h3>User Dashboard</h3>

</header>

<div class="container">

<div class="card">

<h2>Welcome!</h2>

<p>You have successfully logged into your account.</p>

</div>

<div class="menu">

<a href="#">👤 My Profile</a>

<a href="#">🙋 Volunteer Application</a>

<a href="#">📄 Upload CV</a>

<a href="#">📷 Upload Passport</a>

<a href="#">❤️ Make Donation</a>

<a href="#">📨 Contact Administration</a>

<a href="/logout" class="logout">Logout</a>

</div>

</div>

</body>
</html>
